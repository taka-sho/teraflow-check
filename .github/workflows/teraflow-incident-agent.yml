# TF-014: Incident Investigation Agent
# Triggered by: issues labeled with "incident-*"
# Action: Analyze incident, post investigation report
name: teraflow-incident-agent
on:
  issues:
    types: [labeled]

concurrency:
  group: teraflow-incident-${{ github.event.issue.id }}
  cancel-in-progress: false

jobs:
  incident-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    if: startsWith(github.event.label.name, 'incident-')
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::ANTHROPIC_API_KEY is not set. Skipping agent."
            echo "has_key=false" >> $GITHUB_OUTPUT
          fi

      - name: Install teraflow
        run: |
          VERSION=$(curl -s https://api.github.com/repos/taka-sho/teraflow/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/taka-sho/teraflow/releases/download/${VERSION}/teraflow_${VERSION#v}_linux_amd64.tar.gz" | tar xz -C /tmp
          chmod +x /tmp/teraflow && sudo mv /tmp/teraflow /usr/local/bin/

      - name: Investigate incident
        id: investigate
        if: steps.check.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat > /tmp/incident_input.txt << 'ENDINPUT'
          Incident: ${{ github.event.issue.title }}
          Severity label: ${{ github.event.label.name }}

          ${{ github.event.issue.body }}
          ENDINPUT

          # Add recent rework log if exists
          if [ -f .teraflow/rework-log.yml ]; then
            echo "--- Recent Rework Log ---" >> /tmp/incident_input.txt
            tail -50 .teraflow/rework-log.yml >> /tmp/incident_input.txt
          fi

          teraflow agent assign \
            --type incident \
            --input-file /tmp/incident_input.txt \
            --format json \
            --config .github/teraflow.yml \
            > /tmp/incident_result.json 2>/dev/null || \
            echo '{"output":"インシデント調査に失敗しました。"}' > /tmp/incident_result.json

          OUTPUT=$(python3 -c "import json; print(json.load(open('/tmp/incident_result.json')).get('output',''))" 2>/dev/null || echo "調査失敗")

          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Record incident and post analysis
        if: steps.check.outputs.has_key == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL: ${{ github.event.label.name }}
        run: |
          # Record in teraflow incident log
          teraflow incident create \
            --title "${{ github.event.issue.title }}" \
            --severity "${LABEL#incident-}" \
            --config .github/teraflow.yml 2>/dev/null || true

          gh issue comment ${{ github.event.issue.number }} --body \
            "## 🚨 AI Incident Investigation

          ${{ steps.investigate.outputs.output }}

          ---
          インシデントを記録しました（\`teraflow incident list\` で確認可能）。

          > *teraflow incident-agent による自動調査です。*"

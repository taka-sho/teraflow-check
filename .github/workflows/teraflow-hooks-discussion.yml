name: teraflow-hooks-discussion
on:
  discussion:
    types: [created]
  discussion_comment:
    types: [created]

concurrency:
  group: teraflow-hooks-discussion-${{ github.event.discussion.id || github.run_id }}
  cancel-in-progress: false

jobs:
  hook-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      discussions: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false
      - name: Install teraflow
        run: go install github.com/taka-sho/teraflow@v0.5.6
      - name: Run hook on_discussion_created
        if: github.event_name == 'discussion'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          teraflow hook run "on_discussion_created" \
            --author "${{ github.event.sender.login }}" \
            --category "${{ github.event.discussion.category.name }}" \
            --input "${{ github.event.discussion.body }}" \
            --discussion-id "${{ github.event.discussion.node_id }}" \
            --config .github/teraflow.yml \
            --format json
      - name: Run hook on_discussion_comment
        if: github.event_name == 'discussion_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          teraflow hook run "on_discussion_comment" \
            --author "${{ github.event.sender.login }}" \
            --category "${{ github.event.discussion.category.name }}" \
            --input "${{ github.event.comment.body || github.event.discussion.body }}" \
            --discussion-id "${{ github.event.discussion.node_id }}" \
            --config .github/teraflow.yml \
            --format json

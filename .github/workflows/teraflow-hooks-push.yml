name: teraflow-hooks-push
on:
  push:
    branches: ['**']

concurrency:
  group: teraflow-hooks-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hook-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false
      - name: Install teraflow
        run: go install github.com/taka-sho/teraflow@v0.5.5
      - name: Run hook on_push
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          teraflow hook run "on_push" \
            --author "${{ github.actor }}" \
            --input "${{ github.event.head_commit.message }}" \
            --config .github/teraflow.yml \
            --format json

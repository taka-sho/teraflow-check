# teraflow-artifact-finalize.yml
# TF-005: Artifact Finalize workflow template
name: teraflow-artifact-finalize
on:
  issues:
    types: [labeled]

concurrency:
  group: teraflow-state-update
  cancel-in-progress: false

jobs:
  artifact-finalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    if: github.event.label.name == '確定' || github.event.label.name == 'confirmed'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest state
        run: git pull --rebase origin main || true

      - name: Install teraflow
        run: |
          VERSION=$(curl -s https://api.github.com/repos/taka-sho/teraflow/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/taka-sho/teraflow/releases/download/${VERSION}/teraflow_${VERSION#v}_linux_amd64.tar.gz" | tar xz -C /tmp
          chmod +x /tmp/teraflow && sudo mv /tmp/teraflow /usr/local/bin/
          teraflow --version

      - name: Finalize artifact
        id: finalize
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          set -e

          teraflow changelog add "chore" "Artifact confirmed: Issue #${ISSUE_NUMBER} - ${ISSUE_TITLE}" \
            --config .github/teraflow.yml

          teraflow schedule update --config .github/teraflow.yml 2>/dev/null || true

          echo "artifact_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

      - name: Commit and push
        run: |
          git add .teraflow/changelog/ .teraflow/schedule.yml || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(artifact): finalize Issue #${{ github.event.issue.number }} [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Post confirmation comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body \
            "🏆 **成果物を確定しました**

          - Issue: #${{ github.event.issue.number }}
          - タイトル: ${{ github.event.issue.title }}
          - 確定日時: $(date -u '+%Y-%m-%dT%H:%M:%SZ')

          changelog に記録しました。"

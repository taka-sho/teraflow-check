# teraflow-dashboard-deploy.yml
# TF-013: Dashboard Deploy workflow template
name: teraflow-dashboard-deploy
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: teraflow-dashboard
  cancel-in-progress: false

jobs:
  dashboard-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5

        with:

          go-version: stable
          cache: false

      - name: Install teraflow (pinned to latest GitHub Release)

        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GONOSUMCHECK: github.com/taka-sho/teraflow
          GONOSUMDB: github.com/taka-sho/teraflow

        run: |

          set -e
          go install "github.com/taka-sho/teraflow@v0.5.22"

      - name: Pull latest state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true

      - name: Generate dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs/dashboard

          # Generate dashboard as markdown
          teraflow dashboard show --config .github/teraflow.yml \
            > docs/dashboard/index.md 2>/dev/null || \
            printf "# teraflow Project Dashboard\n\nGenerated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')\n" \
            > docs/dashboard/index.md

          # Generate HTML wrapper for GitHub Pages
          cat > docs/dashboard/index.html << 'ENDDOCS'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>teraflow Dashboard</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; }
              pre { background: #f6f8fa; padding: 1rem; border-radius: 6px; overflow-x: auto; }
              table { border-collapse: collapse; width: 100%; }
              th, td { border: 1px solid #d0d7de; padding: 6px 13px; }
              th { background: #f6f8fa; }
            </style>
            <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
          </head>
          <body>
            <div id="content"><p>Loading...</p></div>
            <script>
              fetch('index.md')
                .then(r => r.text())
                .then(t => { document.getElementById('content').innerHTML = marked.parse(t); })
                .catch(e => { document.getElementById('content').innerHTML = '<p>Error loading dashboard</p>'; });
            </script>
          </body>
          </html>
          ENDDOCS

          echo "Dashboard generated: $(wc -l < docs/dashboard/index.md) lines"

      - name: Commit dashboard update
        run: |
          git add docs/dashboard/ || true
          git diff --cached --quiet && echo "No dashboard changes to commit" && exit 0
          git commit -m "chore(dashboard): auto-update project dashboard [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

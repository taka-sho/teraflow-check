# TF-004: Requirements AI Agent
# Triggered by: discussion created or discussion_comment created
# Action: Analyze discussion, organize requirements, post structured comment
name: teraflow-req-agent
on:
  discussion:
    types: [created]
  discussion_comment:
    types: [created]

concurrency:
  group: teraflow-req-agent-${{ github.event.discussion.id }}
  cancel-in-progress: false

jobs:
  req-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$OPENAI_API_KEY" ]; then
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Neither ANTHROPIC_API_KEY nor OPENAI_API_KEY is set. Skipping agent."
            echo "has_key=false" >> $GITHUB_OUTPUT
          fi

      - name: Check RBAC permission
        if: steps.check.outputs.has_key == 'true'
        id: rbac_check
        run: |
          SENDER="${{ github.event.sender.login }}"
          RESULT=$(teraflow rbac check \
            --user "$SENDER" \
            --action "agent.run.requirements" \
            --config .github/teraflow.yml \
            --format json 2>/dev/null || echo '{"allowed":true}')
          ALLOWED=$(echo "$RESULT" | python3 -c \
            "import json,sys; print(json.load(sys.stdin).get('allowed', True))" \
            2>/dev/null || echo "True")
          echo "allowed=$ALLOWED" >> $GITHUB_OUTPUT
          echo "sender=$SENDER" >> $GITHUB_OUTPUT

      - name: Post API key not set warning
        if: steps.check.outputs.has_key == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "discussion_comment" ]; then
            REPLY_ARGS="-f replyToId=${{ github.event.comment.node_id }}"
          else
            REPLY_ARGS=""
          fi

          gh api graphql -f query='
            mutation($id: ID!, $body: String!, $replyToId: ID) {
              addDiscussionComment(input: {discussionId: $id, body: $body, replyToId: $replyToId}) {
                comment { id }
              }
            }' \
            -f id="${{ github.event.discussion.node_id }}" \
            -f body="## ⚠️ AI Agent が応答できませんでした

          API キーが設定されていないため、AI による要件整理を実行できませんでした。

          **対応方法:**
          1. リポジトリの Settings → Secrets and variables → Actions を開く
          2. \`.github/teraflow.yml\` の \`assignments\` 設定を確認
          3. プロバイダーに応じたシークレットを登録:
             - Anthropic: \`ANTHROPIC_API_KEY\`
             - OpenAI: \`OPENAI_API_KEY\`
          4. 設定後、再度 Discussion にコメントすると AI が応答します

          詳細: [AI Provider 設定ガイド](docs/guide/ai-providers.md)" \
            $REPLY_ARGS

      - name: Post permission denied comment
        if: steps.rbac_check.outputs.allowed == 'False'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "discussion_comment" ]; then
            REPLY_ARGS="-f replyToId=${{ github.event.comment.node_id }}"
          else
            REPLY_ARGS=""
          fi

          gh api graphql -f query='
            mutation($id: ID!, $body: String!, $replyToId: ID) {
              addDiscussionComment(input: {discussionId: $id, body: $body, replyToId: $replyToId}) {
                comment { id }
              }
            }' \
            -f id="${{ github.event.discussion.node_id }}" \
            -f body="## 🔒 権限不足

          @${{ steps.rbac_check.outputs.sender }} には \`agent.run.requirements\` 権限がありません。
          管理者にロールの付与を依頼してください。

          > *teraflow RBAC による自動チェック*" \
            $REPLY_ARGS


      - uses: actions/setup-go@v5


        with:


          go-version: stable
          cache: false


      - name: Install teraflow
        if: steps.check.outputs.has_key == 'true'


        run: go install github.com/taka-sho/teraflow@latest

      - name: Fetch discussion history
        if: steps.check.outputs.has_key == 'true'
        id: history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                discussion(number: $number) {
                  title
                  body
                  comments(last: 20) {
                    nodes {
                      author { login }
                      body
                      createdAt
                    }
                  }
                }
              }
            }' \
            -f owner="${{ github.repository_owner }}" \
            -f repo="${{ github.event.repository.name }}" \
            -F number=${{ github.event.discussion.number }} \
            > /tmp/discussion_history.json 2>/dev/null || echo '{}' > /tmp/discussion_history.json

          python3 - << 'PYEOF' > /tmp/conversation_history.txt
          import json

          data = json.load(open('/tmp/discussion_history.json'))
          discussion = data.get('data', {}).get('repository', {}).get('discussion', {})
          lines = []
          lines.append(f"# Discussion: {discussion.get('title', '')}")
          lines.append(f"\n## 最初の投稿\n{discussion.get('body', '')}\n")

          comments = discussion.get('comments', {}).get('nodes', [])
          if comments:
              lines.append("## コメント履歴")
              for c in comments:
                  author = c.get('author', {}).get('login', 'unknown')
                  lines.append(f"\n**{author}**: {c.get('body', '')}")

          print('\n'.join(lines))
          PYEOF

      - name: Determine response mode
        if: steps.check.outputs.has_key == 'true'
        id: mode
        run: |
          COMMENT="${{ github.event.comment.body }}"
          if echo "$COMMENT" | grep -q "要求確定"; then
            echo "mode=confirm" >> $GITHUB_OUTPUT
          else
            echo "mode=dialogue" >> $GITHUB_OUTPUT
          fi

      - name: Post ACK comment
        if: steps.check.outputs.has_key == 'true' && steps.rbac_check.outputs.allowed != 'False'
        id: ack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "discussion_comment" ]; then
            REPLY_ARGS="-f replyToId=${{ github.event.comment.node_id }}"
          else
            REPLY_ARGS=""
          fi

          ACK_RESULT=$(gh api graphql -f query='
            mutation($id: ID!, $body: String!, $replyToId: ID) {
              addDiscussionComment(input: {discussionId: $id, body: $body, replyToId: $replyToId}) {
                comment { id }
              }
            }' \
            -f id="${{ github.event.discussion.node_id }}" \
            -f body="📝 内容を確認中です..." \
            $REPLY_ARGS 2>/dev/null || echo '{}')

          ACK_ID=$(echo "$ACK_RESULT" | python3 -c \
            "import json,sys; print(json.load(sys.stdin).get('data',{}).get('addDiscussionComment',{}).get('comment',{}).get('id',''))" \
            2>/dev/null || echo "")
          echo "comment_id=$ACK_ID" >> $GITHUB_OUTPUT

      - name: AI dialogue response
        if: steps.check.outputs.has_key == 'true' && steps.rbac_check.outputs.allowed != 'False'
        id: req
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          COMMENT="${{ github.event.comment.body }}"

          cp /tmp/conversation_history.txt /tmp/req_input.txt

          if [ -n "$COMMENT" ]; then
            echo "" >> /tmp/req_input.txt
            echo "最新コメント: $COMMENT" >> /tmp/req_input.txt
          fi

          if [ "$MODE" = "confirm" ]; then
            echo "" >> /tmp/req_input.txt
            echo "（注: ユーザーが「要求確定」を発言しました。最終要件を構造化して出力してください。）" >> /tmp/req_input.txt
          fi

          teraflow agent assign \
            --type requirements \
            --user "${{ steps.rbac_check.outputs.sender }}" \
            --skill requirements \
            --input-file /tmp/req_input.txt \
            --format json \
            --config .github/teraflow.yml \
            > /tmp/req_result.json 2>/dev/null || \
            echo '{"output":"要件整理に失敗しました。"}' > /tmp/req_result.json

          OUTPUT=$(python3 -c "import json; print(json.load(open('/tmp/req_result.json')).get('output', ''))" 2>/dev/null || echo "要件整理の実行に失敗しました。")
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate CoDD document and create PR
        if: steps.mode.outputs.mode == 'confirm' && steps.check.outputs.has_key == 'true' && steps.rbac_check.outputs.allowed != 'False'
        id: docgen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESULT=$(teraflow doc generate \
            --discussion ${{ github.event.discussion.number }} \
            --config .github/teraflow.yml \
            --create-pr \
            --format json 2>&1) || true

          PR_URL=$(echo "$RESULT" | python3 -c \
            "import json,sys; print(json.load(sys.stdin).get('pr_url',''))" \
            2>/dev/null || echo "")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Update ACK to real response
        if: steps.check.outputs.has_key == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          if [ "$MODE" = "confirm" ]; then
            HEADER="## 📋 要件確定"
            PR_URL="${{ steps.docgen.outputs.pr_url }}"
            if [ -n "$PR_URL" ]; then
              FOOTER="📄 CoDD要件定義書のPRを作成しました: $PR_URL

> *teraflow req-agent による要件確定です。内容を確認の上、修正してください。*"
            else
              FOOTER="> *teraflow req-agent による要件確定です。内容を確認の上、修正してください。*"
            fi
          else
            HEADER="## 💬 AI壁打ち"
            FOOTER="> *teraflow req-agent との壁打ちです。「要求確定」と発言すると最終要件を出力します。*"
          fi

          if [ -n "${{ steps.ack.outputs.comment_id }}" ]; then
            gh api graphql -f query='
              mutation($id: ID!, $body: String!) {
                updateDiscussionComment(input: {commentId: $id, body: $body}) {
                  comment { id }
                }
              }' \
              -f id="${{ steps.ack.outputs.comment_id }}" \
              -f body="$HEADER

            ${{ steps.req.outputs.output }}

            $FOOTER"
          else
            if [ "${{ github.event_name }}" = "discussion_comment" ]; then
              REPLY_ARGS="-f replyToId=${{ github.event.comment.node_id }}"
            else
              REPLY_ARGS=""
            fi

            gh api graphql -f query='
              mutation($id: ID!, $body: String!, $replyToId: ID) {
                addDiscussionComment(input: {discussionId: $id, body: $body, replyToId: $replyToId}) {
                  comment { id }
                }
              }' \
              -f id="${{ github.event.discussion.node_id }}" \
              -f body="$HEADER

            ${{ steps.req.outputs.output }}

            $FOOTER" \
              $REPLY_ARGS
          fi

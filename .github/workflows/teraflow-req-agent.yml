# TF-004: Requirements AI Agent
# Triggered by: discussion created or discussion_comment created
# Action: Analyze discussion, organize requirements, post structured comment
name: teraflow-req-agent
on:
  discussion:
    types: [created]
  discussion_comment:
    types: [created]

concurrency:
  group: teraflow-req-agent-${{ github.event.discussion.id }}
  cancel-in-progress: false

jobs:
  req-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      discussions: write
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$OPENAI_API_KEY" ]; then
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Neither ANTHROPIC_API_KEY nor OPENAI_API_KEY is set. Skipping agent."
            echo "has_key=false" >> $GITHUB_OUTPUT
          fi


      - uses: actions/setup-go@v5


        with:


          go-version: stable
          cache: false


      - name: Install teraflow
        if: steps.check.outputs.has_key == 'true'


        run: go install github.com/taka-sho/teraflow@latest

      - name: Organize requirements
        if: steps.check.outputs.has_key == 'true'
        id: req
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DISCUSSION_TITLE="${{ github.event.discussion.title }}"
          DISCUSSION_BODY="${{ github.event.discussion.body }}"
          COMMENT_BODY="${{ github.event.comment.body }}"

          cat > /tmp/req_input.txt << 'ENDINPUT'
          Discussion: ${{ github.event.discussion.title }}

          ${{ github.event.discussion.body }}
          ENDINPUT

          # comment がある場合のみ追記
          if [ -n "$COMMENT_BODY" ]; then
            echo "" >> /tmp/req_input.txt
            echo "Latest comment: $COMMENT_BODY" >> /tmp/req_input.txt
          fi

          teraflow agent assign \
            --type requirements \
            --input-file /tmp/req_input.txt \
            --format json \
            --config .github/teraflow.yml \
            > /tmp/req_result.json 2>/dev/null || \
            echo '{"output":"要件整理に失敗しました。"}' > /tmp/req_result.json

          OUTPUT=$(python3 -c "import json; print(json.load(open('/tmp/req_result.json')).get('output', ''))" 2>/dev/null || echo "要件整理の実行に失敗しました。")

          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post requirements summary
        if: steps.check.outputs.has_key == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql -f query='
            mutation($id: ID!, $body: String!) {
              addDiscussionComment(input: {discussionId: $id, body: $body}) {
                comment { id }
              }
            }' \
            -f id="${{ github.event.discussion.node_id }}" \
            -f body="## 📋 AI 要件整理

          ${{ steps.req.outputs.output }}

          > *teraflow req-agent による自動整理です。内容を確認の上、修正してください。*"

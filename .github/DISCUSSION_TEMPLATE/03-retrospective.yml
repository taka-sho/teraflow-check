title: "🔄 03-Retrospective"
body:
  - type: dropdown
    id: retro-target
    attributes:
      label: "振り返り対象"
      description: "振り返りの対象を選択してください"
      options:
        - "スプリント"
        - "フェーズ完了"
        - "インシデント"
        - "リリース"
        - "手戻り分析"
    validations:
      required: true
  - type: input
    id: period
    attributes:
      label: "対象期間"
      description: "振り返り対象の期間を記入してください"
      placeholder: "例: 2026-03-01 〜 2026-03-31"
    validations:
      required: true
  - type: textarea
    id: keep
    attributes:
      label: "Keep（継続すること）"
      description: "うまくいったこと、継続すべきことを記述してください"
      placeholder: "例:\n- デイリースタンドアップが機能し、ブロッカーの早期発見につながった"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: "Problem（課題・問題点）"
      description: "うまくいかなかったこと、問題になったことを記述してください"
      placeholder: "例:\n- テスト工数の見積もりが不足していた"
    validations:
      required: true
  - type: textarea
    id: try
    attributes:
      label: "Try（改善アクション）"
      description: "次回試してみたいこと、改善策を記述してください"
      placeholder: "例:\n- テスト計画を設計フェーズに前倒しする"
    validations:
      required: true
  - type: textarea
    id: metrics
    attributes:
      label: "定量データ"
      description: "速度、バグ件数、カバレッジ等の定量的データがあれば記述してください"
      placeholder: "例:\n- ベロシティ: 42 SP（前回: 38 SP）\n- テストカバレッジ: 87%"
    validations:
      required: false

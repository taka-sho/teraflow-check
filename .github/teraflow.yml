version: "1"

project:
  name: "honya-flow"
  description: ""
  repository: ""

confirmation:
  trigger: "確定"
  req_trigger: "要求確定"

ai:
  default_provider: openai

assignments:
  requirements:
    provider: openai
    model: gpt-4o-mini
  review:
    provider: openai
    model: gpt-4o-mini
  implement:
    provider: openai
    model: gpt-4o-mini
  ci-fix:
    provider: openai
    model: gpt-4o-mini
  conflict:
    provider: openai
    model: gpt-4o-mini
  incident:
    provider: openai
    model: gpt-4o-mini
  maintenance:
    provider: openai
    model: gpt-4o-mini

harness:
  score_threshold: 70
  auto_issue: false

hooks:
  on_push:
    - action: index_update
    - action: summary_update
  on_discussion_created:
    - action: respond
      skill: requirements
  on_discussion_comment:
    - action: respond
      skill: requirements

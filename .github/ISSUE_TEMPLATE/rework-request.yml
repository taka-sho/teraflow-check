name: 手戻り（Rework）申請
description: 前のフェーズへの手戻りを申請します
title: "[Rework] <対象フェーズ>"
labels: ["rework-request"]
body:
  - type: dropdown
    id: target_phase
    attributes:
      label: 手戻り先フェーズ
      options:
        - requirements
        - basic_design
        - detailed_design
        - implementation
        - testing
    validations:
      required: true
  - type: input
    id: group
    attributes:
      label: グループ名（任意）
      placeholder: "例: auth"
  - type: textarea
    id: reason
    attributes:
      label: 手戻り理由
      description: なぜ手戻りが必要かを詳しく説明してください
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 影響範囲（わかる範囲で）

    assistant_comment: '💬 AI壁打ち


      ありがとうございます！要件を深めるためにいくつか質問させてください。


      1. **ターゲットユーザーの特定**: 「初めて使うチュートリアルから、複雑な利用をする人まで」具体的にどのようなユーザー層を想定していますか？初心者向けのチュートリアルと上級者向けの情報、それぞれのニーズをどのように調整しますか？


      2. **コンテンツの種類**: サイトに掲載するコンテンツとして、具体的にはどのようなものを考えていますか？（例: 動画チュートリアル、テキストガイド、FAQ、フォーラムなど）


      3. **デザイン要件**: デザインに関する特別な要望やブランドガイドラインはありますか？ユーザーエクスペリエンスにおいて重視するポイントはありますか？


      4. **技術スタック**: サイトはどのような技術スタックを利用して構築する予定ですか？（例: CMSの利用、特定のプログラミング言語、フレームワークなど）


      5. **リリース時期**: teraflowの公式サイトのリリースに関する具体的な日程など、納期があれば教えてください。


      これらの点についてお考えをお聞かせいただければと思います。'
